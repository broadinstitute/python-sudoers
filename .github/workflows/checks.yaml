---
name: checks
permissions:
  contents: read
  pull-requests: read

"on":
  pull_request:
    branches:
      - main

jobs:
  conventional-commits:
    permissions:
      contents: read
      pull-requests: write
    uses: broadinstitute/shared-workflows/.github/workflows/conventional-commit.yaml@v6
  pre-commit:
    uses: broadinstitute/shared-workflows/.github/workflows/pre-commit.yaml@v6
  linting:
    uses: broadinstitute/shared-workflows/.github/workflows/python-lint.yaml@v6
  unit-tests:
    uses: broadinstitute/shared-workflows/.github/workflows/python-unit-test.yaml@v6
    with:
      python_package_name: pysudoers
      python_versions: '{ "versions": [ "3.11", "3.12", "3.13", "3.14" ] }'
